<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 640" role="img" aria-label="Top-down view of the PlowzBox with eight labeled capability rays: texts and email, missed-call rescue, booking, quotes, invoices, crews and routes, local AI, and the keeper details like weather and reviews">
  <!-- Capability map v1 (imagery pass 2). Top-down device + labeled rays.
       Self-contained dark panel (renders identically on light and dark
       sections), ids prefixed pbxt-, system font stack only, honest labels:
       every ray names a shipping capability from the homepage roster. -->
  <defs>
    <linearGradient id="pbxt-panel" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0" stop-color="#143726"/>
      <stop offset="1" stop-color="#102b1f"/>
    </linearGradient>
    <radialGradient id="pbxt-halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#43d187" stop-opacity="0.20"/>
      <stop offset="0.55" stop-color="#2a9a63" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#1e5e3f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pbxt-lid" x1="0" y1="0" x2="0.7" y2="1">
      <stop offset="0" stop-color="#3a3f3b"/>
      <stop offset="0.5" stop-color="#222623"/>
      <stop offset="1" stop-color="#161917"/>
    </linearGradient>
    <linearGradient id="pbxt-brush" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.03"/>
      <stop offset="0.2" stop-color="#000000" stop-opacity="0.05"/>
      <stop offset="0.4" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="0.62" stop-color="#000000" stop-opacity="0.04"/>
      <stop offset="0.82" stop-color="#ffffff" stop-opacity="0.03"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.05"/>
    </linearGradient>
    <radialGradient id="pbxt-led" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#eafff3" stop-opacity="0.95"/>
      <stop offset="0.35" stop-color="#7df0b4" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#43d187" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pbxt-node" cx="0.5" cy="0.42" r="0.65">
      <stop offset="0" stop-color="#1c4a33"/>
      <stop offset="1" stop-color="#0e2619"/>
    </radialGradient>
  </defs>

  <rect x="1" y="1" width="998" height="638" rx="26" fill="url(#pbxt-panel)" stroke="#2a4a39" stroke-width="2"/>
  <ellipse cx="500" cy="320" rx="330" ry="250" fill="url(#pbxt-halo)"/>

  <!-- rays (center 500,320) -->
  <g fill="none" stroke="#349966" stroke-opacity="0.4" stroke-width="1.8">
    <path d="M392 260 C 330 220 290 200 238 186"/>
    <path d="M378 320 C 300 320 250 320 196 320"/>
    <path d="M392 380 C 330 420 290 440 238 454"/>
    <path d="M608 260 C 670 220 710 200 762 186"/>
    <path d="M622 320 C 700 320 750 320 804 320"/>
    <path d="M608 380 C 670 420 710 440 762 454"/>
    <path d="M460 226 C 430 170 410 140 386 108"/>
    <path d="M540 226 C 570 170 590 140 614 108"/>
  </g>
  <g fill="#7df0b4">
    <circle cx="238" cy="186" r="3"/><circle cx="196" cy="320" r="3"/><circle cx="238" cy="454" r="3"/>
    <circle cx="762" cy="186" r="3"/><circle cx="804" cy="320" r="3"/><circle cx="762" cy="454" r="3"/>
    <circle cx="386" cy="108" r="3"/><circle cx="614" cy="108" r="3"/>
  </g>

  <!-- ============ the box, seen from above ============ -->
  <g>
    <rect x="382" y="230" width="236" height="180" rx="20" fill="#060907" opacity="0.6" transform="translate(6,8)"/>
    <rect x="382" y="230" width="236" height="180" rx="20" fill="url(#pbxt-lid)"/>
    <rect x="382" y="230" width="236" height="180" rx="20" fill="url(#pbxt-brush)"/>
    <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
      <path d="M392 250 H608 M392 274 H608 M392 298 H608 M392 322 H608 M392 346 H608 M392 370 H608 M392 394 H608"/>
    </g>
    <rect x="390" y="238" width="220" height="164" rx="14" fill="none" stroke="#000000" stroke-opacity="0.35" stroke-width="1.2"/>
    <!-- brand mark v2, etched on the lid -->
    <g transform="translate(468,272) scale(1.0)">
      <g fill="#46a878">
        <rect x="7" y="37.5" width="50" height="20.5" rx="7.25"/>
        <path d="M30.5 5.5 C33.7 14 36.1 25.5 35.8 42 L25.4 42 C25.4 25.5 27.6 14 30.5 5.5 Z"/>
        <path d="M12.5 18.5 C17.8 24 21.8 31.5 23.1 42 L16.6 42 C16.2 33.5 14.8 25.5 12.5 18.5 Z"/>
        <path d="M47.5 16.5 C43.4 22.5 40.3 30.5 39.6 42 L45.9 42 C46.4 33.5 47.3 24.5 47.5 16.5 Z"/>
      </g>
      <circle cx="45.5" cy="47.75" r="6.2" fill="#8fd4ae" opacity="0.25"/>
      <circle cx="45.5" cy="47.75" r="3.8" fill="#8fd4ae"/>
    </g>
    <!-- front-edge LED, glowing toward the viewer -->
    <circle cx="432" cy="404" r="26" fill="url(#pbxt-led)"/>
    <circle cx="432" cy="404" r="4" fill="#eafff3"/>
    <!-- power button -->
    <circle cx="588" cy="256" r="7" fill="#141715" stroke="#4a504b" stroke-opacity="0.4" stroke-width="1"/>
  </g>

  <!-- ============ capability nodes + labels ============ -->
  <g font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="17" font-weight="600" fill="#e6f2ea">
    <!-- left column -->
    <g>
      <circle cx="204" cy="186" r="26" fill="url(#pbxt-node)" stroke="#349966" stroke-opacity="0.5" stroke-width="1.5"/>
      <path d="M193 179 h20 a5 5 0 0 1 5 5 v6 a5 5 0 0 1 -5 5 h-10 l-6 6 v-6 h-4 a5 5 0 0 1 -5 -5 v-6 a5 5 0 0 1 5 -5 Z" fill="none" stroke="#c2e8d3" stroke-width="2.2" stroke-linejoin="round"/>
      <text x="204" y="238" text-anchor="middle">Texts + email</text>
    </g>
    <g>
      <circle cx="162" cy="320" r="26" fill="url(#pbxt-node)" stroke="#349966" stroke-opacity="0.5" stroke-width="1.5"/>
      <path d="M152 310 a4 4 0 0 1 4 -3 c2.5 0 4 1.5 5 3.5 c1.5 4 3.5 7.5 6.5 10.5 c3 3 6.5 5 10.5 6.5 c2 1 3.5 2.5 3.5 5 a4 4 0 0 1 -3 4 c-13 1 -27.5 -13 -27 -26.5 Z" fill="none" stroke="#c2e8d3" stroke-width="2.2" stroke-linejoin="round" transform="scale(0.92) translate(14,28)"/>
      <text x="162" y="372" text-anchor="middle">Missed-call rescue</text>
    </g>
    <g>
      <circle cx="204" cy="454" r="26" fill="url(#pbxt-node)" stroke="#349966" stroke-opacity="0.5" stroke-width="1.5"/>
      <g stroke="#c2e8d3" stroke-width="2.2" fill="none" stroke-linejoin="round">
        <rect x="192" y="444" width="24" height="22" rx="3"/>
        <line x1="192" y1="451" x2="216" y2="451"/>
        <line x1="199" y1="441" x2="199" y2="447"/><line x1="209" y1="441" x2="209" y2="447"/>
      </g>
      <circle cx="210" cy="460" r="2.6" fill="#7df0b4"/>
      <text x="204" y="506" text-anchor="middle">Real bookings</text>
    </g>
    <!-- right column -->
    <g>
      <circle cx="796" cy="186" r="26" fill="url(#pbxt-node)" stroke="#349966" stroke-opacity="0.5" stroke-width="1.5"/>
      <g stroke="#c2e8d3" stroke-width="2.2" fill="none" stroke-linejoin="round" stroke-linecap="round">
        <path d="M788 174 h11 l5 5 v16 h-16 Z"/>
        <path d="M799 174 v5 h5"/>
        <path d="M792 186 h8 M792 190 h5"/>
      </g>
      <text x="796" y="238" text-anchor="middle">Quotes that follow up</text>
    </g>
    <g>
      <circle cx="838" cy="320" r="26" fill="url(#pbxt-node)" stroke="#349966" stroke-opacity="0.5" stroke-width="1.5"/>
      <g stroke="#c2e8d3" stroke-width="2.2" fill="none" stroke-linecap="round">
        <line x1="838" y1="308" x2="838" y2="332"/>
        <path d="M844 312 h-9 a4.5 4.5 0 0 0 0 9 h6 a4.5 4.5 0 0 1 0 9 h-10"/>
      </g>
      <text x="838" y="372" text-anchor="middle">Invoices + reminders</text>
    </g>
    <g>
      <circle cx="796" cy="454" r="26" fill="url(#pbxt-node)" stroke="#349966" stroke-opacity="0.5" stroke-width="1.5"/>
      <g fill="none" stroke="#c2e8d3" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M782 459 h5 l3 -10 h13 l4 7 h4 v6 h-3"/>
        <circle cx="792" cy="462" r="3.4"/><circle cx="807" cy="462" r="3.4"/>
      </g>
      <text x="796" y="506" text-anchor="middle">Crews + routes</text>
    </g>
    <!-- top pair -->
    <g>
      <circle cx="360" cy="88" r="26" fill="url(#pbxt-node)" stroke="#349966" stroke-opacity="0.5" stroke-width="1.5"/>
      <g fill="none" stroke="#c2e8d3" stroke-width="2.2" stroke-linejoin="round">
        <rect x="349" y="77" width="22" height="22" rx="4"/>
        <rect x="355" y="83" width="10" height="10"/>
        <line x1="354" y1="72" x2="354" y2="77"/><line x1="366" y1="72" x2="366" y2="77"/>
        <line x1="354" y1="99" x2="354" y2="104"/><line x1="366" y1="99" x2="366" y2="104"/>
      </g>
      <text x="360" y="46" text-anchor="middle">Local AI, no meter</text>
    </g>
    <g>
      <circle cx="640" cy="88" r="26" fill="url(#pbxt-node)" stroke="#349966" stroke-opacity="0.5" stroke-width="1.5"/>
      <g fill="none" stroke="#c2e8d3" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M630 92 a7 7 0 0 1 2 -13 a9 9 0 0 1 17 -2 a6.5 6.5 0 0 1 1 12.8"/>
        <line x1="634" y1="97" x2="632" y2="102"/>
        <line x1="641" y1="97" x2="639" y2="102"/>
        <line x1="648" y1="97" x2="646" y2="102"/>
      </g>
      <text x="640" y="46" text-anchor="middle">Weather, Spanish, reviews</text>
    </g>
  </g>

  <!-- caption chip -->
  <g font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
    <rect x="330" y="570" width="340" height="34" rx="17" fill="#0b241a" stroke="#2a4a39"/>
    <text x="500" y="592" text-anchor="middle" font-size="15" font-weight="600" fill="#b9cfc2">Eight jobs. One box. Zero seats.</text>
  </g>
</svg>
