    <rect x="48" y="29" width="42" height="6" rx="3" fill="#17422e"/>
  </g>
  <!-- service rows -->
  <g>
    <rect x="30" y="48" width="38" height="10" rx="5" fill="#c2e8d3"/>
    <rect x="30" y="63" width="30" height="10" rx="5" fill="#c2e8d3"/>
