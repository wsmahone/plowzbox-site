<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 440" role="img" aria-label="Diagram: missed calls, text messages, email, and booking-page requests all flow into the PlowzBox, which feeds one approval queue.">
  <!-- PlowzBox diagram: one inbox, four channels. ids prefixed ucic- ; self-contained. -->
  <defs>
    <linearGradient id="ucic-panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#143726"/>
      <stop offset="1" stop-color="#102b1f"/>
    </linearGradient>
    <radialGradient id="ucic-led" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#8fd4ae" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#8fd4ae" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="4" y="4" width="752" height="432" rx="26" fill="url(#ucic-panel)" stroke="#2a4a39" stroke-width="1.5"/>

  <!-- heading -->
  <text x="36" y="52" font-family="ui-monospace, SF Mono, Menlo, monospace" font-size="12" letter-spacing="2.5" fill="#8fd4ae">FOUR WAYS IN</text>
  <text x="36" y="82" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="22" font-weight="800" fill="#f2f7f3">One place to answer.</text>

  <!-- channel chips -->
  <g font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="14" font-weight="600">
    <g>
      <rect x="36" y="116" width="188" height="52" rx="12" fill="#17422e" stroke="#2a4a39"/>
      <!-- phone glyph -->
      <path d="M55 137 q0 -4 4 -4 l4 0 q3 0 3.5 3 l0.8 4.5 q0.4 2.5 -1.8 3.7 l-2.4 1.3 q2.4 5.6 7.4 8.4 l1.5 -2.3 q1.4 -2.1 3.9 -1.5 l4.4 1.1 q2.9 0.7 2.7 3.7 l-0.2 3.6 q-0.2 3.9 -4.1 3.7 q-23.7 -1.4 -23.7 -25.2 Z" fill="#8fd4ae"/>
      <text x="94" y="147" fill="#f2f7f3">Missed call</text>
    </g>
    <g>
      <rect x="36" y="182" width="188" height="52" rx="12" fill="#17422e" stroke="#2a4a39"/>
      <!-- sms bubble glyph -->
      <path d="M54 197 h26 q4 0 4 4 v12 q0 4 -4 4 h-14 l-7 6 v-6 h-5 q-4 0 -4 -4 v-12 q0 -4 4 -4 Z" fill="#8fd4ae"/>
      <text x="94" y="213" fill="#f2f7f3">Text message</text>
    </g>
    <g>
      <rect x="36" y="248" width="188" height="52" rx="12" fill="#17422e" stroke="#2a4a39"/>
      <!-- envelope glyph -->
      <rect x="52" y="263" width="32" height="22" rx="4" fill="#8fd4ae"/>
      <path d="M53 265 l15 11 l15 -11" fill="none" stroke="#17422e" stroke-width="2.5" stroke-linecap="round"/>
      <text x="94" y="279" fill="#f2f7f3">Email</text>
    </g>
    <g>
      <rect x="36" y="314" width="188" height="52" rx="12" fill="#17422e" stroke="#2a4a39"/>
      <!-- calendar glyph -->
      <rect x="52" y="330" width="30" height="24" rx="4" fill="#8fd4ae"/>
      <rect x="52" y="330" width="30" height="7" rx="3.5" fill="#55b184"/>
      <rect x="58" y="341" width="6" height="5" rx="1" fill="#17422e"/>
      <rect x="68" y="341" width="6" height="5" rx="1" fill="#17422e"/>
      <text x="94" y="345" fill="#f2f7f3">Booking page</text>
    </g>
  </g>

  <!-- connectors: chips -> box -->
  <g fill="none" stroke="#55b184" stroke-width="2" opacity="0.75">
    <path d="M224 142 C 290 142, 280 208, 330 214"/>
    <path d="M224 208 C 270 208, 285 226, 330 230"/>
    <path d="M224 274 C 270 274, 285 256, 330 250"/>
    <path d="M224 340 C 290 340, 280 274, 330 266"/>
  </g>
  <g fill="#55b184">
    <circle cx="330" cy="214" r="3"/>
    <circle cx="330" cy="230" r="3"/>
    <circle cx="330" cy="250" r="3"/>
    <circle cx="330" cy="266" r="3"/>
  </g>

  <!-- the box -->
  <g>
    <rect x="336" y="192" width="118" height="96" rx="16" fill="#0b241a" stroke="#2a4a39" stroke-width="1.5"/>
    <!-- lid seam -->
    <line x1="344" y1="208" x2="446" y2="208" stroke="#2a4a39" stroke-width="1"/>
    <!-- vents -->
    <g stroke="#2a4a39" stroke-width="2" stroke-linecap="round">
      <line x1="352" y1="270" x2="366" y2="270"/>
      <line x1="372" y1="270" x2="386" y2="270"/>
      <line x1="392" y1="270" x2="406" y2="270"/>
    </g>
    <!-- grass mark -->
    <g fill="#8fd4ae">
      <rect x="381" y="246" width="28" height="4" rx="2"/>
      <path d="M395 222 c1.5 6 2.3 13 2.2 22 l-4.4 0 c-0.1 -9 0.7 -16 2.2 -22 Z"/>
      <path d="M384 228 c3.6 3.8 6 8.6 6.6 16 l-3.8 0 c-0.6 -6 -1.6 -11 -2.8 -16 Z"/>
      <path d="M406 228 c-3.6 3.8 -6 8.6 -6.6 16 l3.8 0 c0.6 -6 1.6 -11 2.8 -16 Z"/>
    </g>
    <!-- LED -->
    <circle cx="440" cy="278" r="9" fill="url(#ucic-led)"/>
    <circle cx="440" cy="278" r="3" fill="#55b184"/>
    <text x="395" y="312" text-anchor="middle" font-family="ui-monospace, SF Mono, Menlo, monospace" font-size="11" letter-spacing="2" fill="#b9cfc2">PLOWZBOX</text>
  </g>

  <!-- connector: box -> queue -->
  <path d="M454 240 C 495 240, 490 232, 524 232" fill="none" stroke="#55b184" stroke-width="2" opacity="0.75"/>
  <path d="M524 232 l-8 -5 v10 Z" fill="#55b184"/>

  <!-- approval queue card -->
  <g>
    <rect x="528" y="118" width="196" height="230" rx="14" fill="#fafaf7" stroke="#e3e5e0"/>
    <text x="546" y="146" font-family="ui-monospace, SF Mono, Menlo, monospace" font-size="10.5" letter-spacing="2" fill="#1e5e3f">APPROVAL QUEUE</text>
    <!-- row 1 -->
    <rect x="544" y="160" width="164" height="46" rx="9" fill="#e1f3e8"/>
    <rect x="554" y="171" width="70" height="6" rx="3" fill="#349966"/>
    <rect x="554" y="184" width="96" height="6" rx="3" fill="#c2e8d3"/>
    <rect x="658" y="172" width="42" height="20" rx="10" fill="#1e5e3f"/>
    <text x="679" y="186" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="10" font-weight="700" fill="#ffffff">Send</text>
    <!-- row 2 -->
    <rect x="544" y="214" width="164" height="46" rx="9" fill="#f1f0ea"/>
    <rect x="554" y="225" width="58" height="6" rx="3" fill="#9aa19c"/>
    <rect x="554" y="238" width="88" height="6" rx="3" fill="#c8cdc8"/>
    <rect x="658" y="226" width="42" height="20" rx="10" fill="#ffffff" stroke="#c8cdc8"/>
    <text x="679" y="240" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="10" font-weight="700" fill="#5b615d">Send</text>
    <!-- row 3 -->
    <rect x="544" y="268" width="164" height="46" rx="9" fill="#f1f0ea"/>
    <rect x="554" y="279" width="76" height="6" rx="3" fill="#9aa19c"/>
    <rect x="554" y="292" width="64" height="6" rx="3" fill="#c8cdc8"/>
    <rect x="658" y="280" width="42" height="20" rx="10" fill="#ffffff" stroke="#c8cdc8"/>
    <text x="679" y="294" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="10" font-weight="700" fill="#5b615d">Send</text>
    <text x="626" y="336" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="11" fill="#5b615d">One tap each. From the truck.</text>
  </g>

  <!-- footer caption -->
  <text x="36" y="412" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="13" fill="#b9cfc2">Calls, texts, email, and bookings land in one queue on the box. You approve, it answers.</text>
</svg>
