<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="The crew's morning run sheet arriving as a plain text on a phone">
  <defs>
    <radialGradient id="spcp-f" cx="0.5" cy="0.42" r="0.8">
      <stop offset="0" stop-color="#123324"/><stop offset="1" stop-color="#0b241a"/>
    </radialGradient>
    <radialGradient id="spcp-g" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7df0b4" stop-opacity="0.55"/><stop offset="1" stop-color="#7df0b4" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect x="4" y="4" width="112" height="112" rx="26" fill="url(#spcp-f)"/>
  <rect x="4" y="4" width="112" height="112" rx="26" fill="none" stroke="#2a4a39" stroke-width="1.5"/>
  <!-- crew phone -->
  <g>
    <rect x="36" y="20" width="48" height="82" rx="10" fill="#06140e" opacity="0.6" transform="translate(2.5,3)"/>
    <rect x="36" y="20" width="48" height="82" rx="10" fill="#f1f0ea"/>
    <rect x="42" y="28" width="36" height="66" rx="6" fill="#17422e"/>
    <rect x="54" y="23" width="12" height="3" rx="1.5" fill="#c8cdc8"/>
  </g>
  <!-- run sheet rows: stop, stop, stop -->
  <g>
    <circle cx="50" cy="40" r="3.6" fill="#8fd4ae"/>
    <rect x="57" y="37.5" width="16" height="5" rx="2.5" fill="#27754f"/>
    <circle cx="50" cy="56" r="3.6" fill="#8fd4ae"/>
    <rect x="57" y="53.5" width="12" height="5" rx="2.5" fill="#27754f"/>
    <circle cx="50" cy="72" r="3.6" fill="#c2e8d3"/>
    <rect x="57" y="69.5" width="16" height="5" rx="2.5" fill="#27754f"/>
    <path d="M50 44 v8 M50 60 v8" stroke="#27754f" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- gate note chip -->
  <rect x="48" y="82" width="24" height="7" rx="3.5" fill="#1e5e3f"/>
  <!-- the route pin, glowing -->
  <circle cx="88" cy="52" r="22" fill="url(#spcp-g)"/>
  <path d="M88 38 a11 11 0 0 1 11 11 c0 8 -11 19 -11 19 s-11 -11 -11 -19 a11 11 0 0 1 11 -11 Z" fill="#06140e" opacity="0.55" transform="translate(2,2.5)"/>
  <path d="M88 38 a11 11 0 0 1 11 11 c0 8 -11 19 -11 19 s-11 -11 -11 -19 a11 11 0 0 1 11 -11 Z" fill="#8fd4ae"/>
  <circle cx="88" cy="49" r="4.2" fill="#123324"/>
</svg>
