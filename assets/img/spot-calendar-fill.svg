<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="A calendar filling with booked jobs">
  <!-- Spot set: the calendar fills itself (bookings land as real jobs). -->
  <g>
    <rect x="16" y="20" width="88" height="80" rx="10" fill="#ffffff" stroke="#123324" stroke-width="4.5"/>
    <path d="M16 42 h88" stroke="#123324" stroke-width="4.5"/>
    <rect x="16" y="20" width="88" height="22" rx="10" fill="#1e5e3f"/>
    <rect x="16" y="34" width="88" height="8" fill="#1e5e3f"/>
    <!-- binding pins -->
    <g stroke="#123324" stroke-width="4.5" stroke-linecap="round">
      <path d="M38 14 v10 M82 14 v10"/>
    </g>
    <!-- day cells: booked = filled -->
    <g>
      <rect x="27" y="52" width="16" height="14" rx="4" fill="#8fd4ae"/>
      <rect x="52" y="52" width="16" height="14" rx="4" fill="#8fd4ae"/>
      <rect x="77" y="52" width="16" height="14" rx="4" fill="#e1f3e8"/>
      <rect x="27" y="74" width="16" height="14" rx="4" fill="#8fd4ae"/>
      <rect x="52" y="74" width="16" height="14" rx="4" fill="#e1f3e8"/>
      <rect x="77" y="74" width="16" height="14" rx="4" fill="#e1f3e8"/>
    </g>
  </g>
  <!-- a new booking landing -->
  <circle cx="98" cy="98" r="13" fill="#1e5e3f"/>
  <path d="M98 92 v12 M92 98 h12" stroke="#c2e8d3" stroke-width="3.5" stroke-linecap="round"/>
</svg>
