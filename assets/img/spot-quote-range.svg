<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="A quote given as an honest range">
  <!-- Spot set: the quote is a range with two handles - never an invented
       single number. -->
  <g>
    <path d="M26 14 h48 l20 20 v70 a8 8 0 0 1 -8 8 h-60 a8 8 0 0 1 -8 -8 v-82 a8 8 0 0 1 8 -8 Z"
          fill="#ffffff" stroke="#123324" stroke-width="4.5" stroke-linejoin="round"/>
    <path d="M74 14 v14 a6 6 0 0 0 6 6 h14" fill="#e1f3e8" stroke="#123324" stroke-width="4.5" stroke-linejoin="round"/>
  </g>
  <!-- dollar chip -->
  <circle cx="42" cy="46" r="12" fill="#1e5e3f"/>
  <g stroke="#c2e8d3" stroke-width="3.2" stroke-linecap="round" fill="none">
    <path d="M46.5 41.5 c-6 -4.4 -13 1 -7.6 4.8 l6.4 3 c5 3.6 -2.4 8.6 -8 4.6"/>
    <path d="M42 37.5 v17"/>
  </g>
  <!-- text lines -->
  <g stroke="#c8cdc8" stroke-width="3.5" stroke-linecap="round">
    <path d="M62 42 h22 M62 52 h16"/>
  </g>
  <!-- the range bar -->
  <g>
    <path d="M32 84 h56" stroke="#e1f3e8" stroke-width="8" stroke-linecap="round"/>
    <path d="M46 84 h28" stroke="#349966" stroke-width="8" stroke-linecap="round"/>
    <circle cx="46" cy="84" r="7.5" fill="#ffffff" stroke="#123324" stroke-width="4.5"/>
    <circle cx="74" cy="84" r="7.5" fill="#ffffff" stroke="#123324" stroke-width="4.5"/>
  </g>
</svg>
