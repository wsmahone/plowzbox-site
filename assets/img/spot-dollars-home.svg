<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="The money stays at your shop">
  <!-- Spot set: dollars staying home - no per-seat fees leaving the
       building. The shop keeps its own money. -->
  <!-- shop silhouette -->
  <g fill="#ffffff" stroke="#123324" stroke-width="4.5" stroke-linejoin="round">
    <path d="M18 52 L60 24 L102 52 v46 a6 6 0 0 1 -6 6 h-72 a6 6 0 0 1 -6 -6 Z"/>
    <!-- garage door -->
    <rect x="42" y="62" width="36" height="42" rx="4" fill="#e1f3e8"/>
  </g>
  <g stroke="#123324" stroke-width="3" stroke-linecap="round" opacity="0.35">
    <path d="M46 72 h28 M46 82 h28 M46 92 h28"/>
  </g>
  <!-- roof ridge highlight -->
  <path d="M26 50 L60 27.5 L94 50" fill="none" stroke="#349966" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- the dollar, home -->
  <circle cx="60" cy="82" r="15" fill="#1e5e3f"/>
  <g stroke="#c2e8d3" stroke-width="3.4" stroke-linecap="round" fill="none">
    <path d="M65.6 76.4 c-7.5 -5.5 -16.3 1.3 -9.5 6 l8 3.7 c6.2 4.5 -3 10.8 -10 5.8"/>
    <path d="M60 71.5 v21"/>
  </g>
</svg>
