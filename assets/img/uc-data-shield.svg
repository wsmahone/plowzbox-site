<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 440" role="img" aria-label="Illustration: the PlowzBox inside a shield, with a crossed-out cloud. Your customer data stays on the box, encrypted, with no cloud copy.">
  <!-- PlowzBox glyph: data stays on the box. ids prefixed ucds- ; self-contained. -->
  <defs>
    <linearGradient id="ucds-panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#143726"/>
      <stop offset="1" stop-color="#102b1f"/>
    </linearGradient>
    <radialGradient id="ucds-led" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#8fd4ae" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#8fd4ae" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="4" y="4" width="412" height="432" rx="26" fill="url(#ucds-panel)" stroke="#2a4a39" stroke-width="1.5"/>

  <text x="32" y="50" font-family="ui-monospace, SF Mono, Menlo, monospace" font-size="12" letter-spacing="2.5" fill="#8fd4ae">YOUR DATA</text>
  <text x="32" y="80" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="22" font-weight="800" fill="#f2f7f3">It stays on the box.</text>

  <!-- shield -->
  <path d="M210 108 C 245 126, 272 132, 296 134 C 296 232, 268 296, 210 330 C 152 296, 124 232, 124 134 C 148 132, 175 126, 210 108 Z"
        fill="#17422e" stroke="#8fd4ae" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- the box inside the shield -->
  <g>
    <rect x="158" y="168" width="104" height="82" rx="14" fill="#0b241a" stroke="#2a4a39" stroke-width="1.5"/>
    <line x1="166" y1="182" x2="254" y2="182" stroke="#2a4a39" stroke-width="1"/>
    <!-- grass mark -->
    <g fill="#8fd4ae">
      <rect x="197" y="216" width="26" height="4" rx="2"/>
      <path d="M210 192 c1.4 5.6 2.1 12 2 20 l-4 0 c-0.1 -8 0.6 -14.4 2 -20 Z"/>
      <path d="M200 197 c3.2 3.4 5.4 7.8 6 15 l-3.4 0 c-0.6 -5.4 -1.4 -10 -2.6 -15 Z"/>
      <path d="M220 197 c-3.2 3.4 -5.4 7.8 -6 15 l3.4 0 c0.6 -5.4 1.4 -10 2.6 -15 Z"/>
    </g>
    <!-- vents + LED -->
    <g stroke="#2a4a39" stroke-width="2" stroke-linecap="round">
      <line x1="170" y1="236" x2="182" y2="236"/>
      <line x1="188" y1="236" x2="200" y2="236"/>
    </g>
    <circle cx="248" cy="238" r="8" fill="url(#ucds-led)"/>
    <circle cx="248" cy="238" r="2.6" fill="#55b184"/>
  </g>

  <!-- padlock under the box, inside shield -->
  <g>
    <rect x="196" y="272" width="28" height="22" rx="5" fill="#8fd4ae"/>
    <path d="M202 272 v-6 a8 8 0 0 1 16 0 v6" fill="none" stroke="#8fd4ae" stroke-width="3.5" stroke-linecap="round"/>
    <circle cx="210" cy="281" r="3" fill="#123324"/>
    <rect x="208.6" y="282" width="2.8" height="6" rx="1.4" fill="#123324"/>
  </g>

  <!-- crossed-out cloud -->
  <g>
    <path d="M312 176 a14 14 0 0 1 13 -9 a15 15 0 0 1 29 4 a11 11 0 0 1 -1 22 l-36 0 a12 12 0 0 1 -5 -17 Z"
          fill="none" stroke="#b9cfc2" stroke-width="2.2" stroke-linejoin="round" opacity="0.8"/>
    <line x1="306" y1="200" x2="362" y2="160" stroke="#b9cfc2" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
    <text x="334" y="216" text-anchor="middle" font-family="ui-monospace, SF Mono, Menlo, monospace" font-size="9.5" letter-spacing="1.2" fill="#b9cfc2">NO CLOUD</text>
    <text x="334" y="229" text-anchor="middle" font-family="ui-monospace, SF Mono, Menlo, monospace" font-size="9.5" letter-spacing="1.2" fill="#b9cfc2">COPY</text>
  </g>

  <!-- feature line -->
  <g font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="12.5" fill="#b9cfc2">
    <g>
      <path d="M36 366 l4 4 l7 -7" fill="none" stroke="#55b184" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="54" y="370">Full-disk encryption</text>
    </g>
    <g>
      <path d="M206 366 l4 4 l7 -7" fill="none" stroke="#55b184" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="224" y="370">No inbound connections</text>
    </g>
  </g>

  <text x="32" y="399" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="13" fill="#b9cfc2">Customer list, schedule, and the AI itself:</text>
  <text x="32" y="416" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="13" fill="#b9cfc2">on your box, in your building.</text>
</svg>
