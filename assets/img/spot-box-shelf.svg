<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="The PlowzBox on its shelf, one green light on">
  <defs>
    <radialGradient id="spbs-f" cx="0.5" cy="0.42" r="0.8">
      <stop offset="0" stop-color="#123324"/><stop offset="1" stop-color="#0b241a"/>
    </radialGradient>
    <radialGradient id="spbs-g" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7df0b4" stop-opacity="0.6"/><stop offset="1" stop-color="#7df0b4" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect x="4" y="4" width="112" height="112" rx="26" fill="url(#spbs-f)"/>
  <rect x="4" y="4" width="112" height="112" rx="26" fill="none" stroke="#2a4a39" stroke-width="1.5"/>
  <!-- shelf plank -->
  <g>
    <rect x="20" y="72" width="80" height="10" rx="3" fill="#06140e" opacity="0.6" transform="translate(2.5,3)"/>
    <rect x="20" y="72" width="80" height="10" rx="3" fill="#8a744e"/>
    <rect x="20" y="80" width="80" height="4" rx="2" fill="#5f4e33"/>
    <path d="M30 84 h8 v14 l-8 -7 Z" fill="#3d3222"/>
    <path d="M82 84 h8 v14 l-8 -7 Z" fill="#3d3222"/>
  </g>
  <!-- the box, paper-cut -->
  <g>
    <rect x="32" y="42" width="56" height="30" rx="8" fill="#06140e" opacity="0.6" transform="translate(2.5,3)"/>
    <rect x="32" y="42" width="56" height="30" rx="8" fill="#191c1a"/>
    <path d="M38 44.5 h44" stroke="#8fe7bb" stroke-opacity="0.5" stroke-width="1.8" stroke-linecap="round"/>
    <g fill="#050705">
      <rect x="74" y="50" width="3" height="14" rx="1.5"/>
      <rect x="80" y="50" width="3" height="14" rx="1.5"/>
    </g>
    <!-- v2 mark, etched tiny -->
    <g transform="translate(42,48) scale(0.32)" fill="#46a878">
      <rect x="7" y="37.5" width="50" height="20.5" rx="7.25"/>
      <path d="M30.5 5.5 C33.7 14 36.1 25.5 35.8 42 L25.4 42 C25.4 25.5 27.6 14 30.5 5.5 Z"/>
      <path d="M12.5 18.5 C17.8 24 21.8 31.5 23.1 42 L16.6 42 C16.2 33.5 14.8 25.5 12.5 18.5 Z"/>
      <path d="M47.5 16.5 C43.4 22.5 40.3 30.5 39.6 42 L45.9 42 C46.4 33.5 47.3 24.5 47.5 16.5 Z"/>
    </g>
  </g>
  <!-- the one light -->
  <circle cx="40" cy="66" r="18" fill="url(#spbs-g)"/>
  <circle cx="40" cy="66" r="2.6" fill="#eafff3"/>
  <!-- one cable to the router, off-frame -->
  <path d="M88 62 C 98 64 102 60 106 54" fill="none" stroke="#27754f" stroke-width="3" stroke-linecap="round"/>
