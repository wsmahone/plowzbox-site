<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Rain moving the day's jobs to the next dry day, with approval">
  <defs>
    <radialGradient id="sprr-f" cx="0.5" cy="0.42" r="0.8">
      <stop offset="0" stop-color="#123324"/><stop offset="1" stop-color="#0b241a"/>
    </radialGradient>
    <radialGradient id="sprr-g" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7df0b4" stop-opacity="0.55"/><stop offset="1" stop-color="#7df0b4" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect x="4" y="4" width="112" height="112" rx="26" fill="url(#sprr-f)"/>
  <rect x="4" y="4" width="112" height="112" rx="26" fill="none" stroke="#2a4a39" stroke-width="1.5"/>
  <!-- cloud, cut from paper -->
  <g>
    <path d="M30 46 a12 12 0 0 1 12 -12 a15 15 0 0 1 28 -4 a11 11 0 0 1 8 19 l-40 0 a10 10 0 0 1 -8 -3 Z" fill="#06140e" opacity="0.6" transform="translate(2.5,3)"/>
    <path d="M30 46 a12 12 0 0 1 12 -12 a15 15 0 0 1 28 -4 a11 11 0 0 1 8 19 l-40 0 a10 10 0 0 1 -8 -3 Z" fill="#c2e8d3"/>
  </g>
  <g stroke="#5a8f75" stroke-width="3.4" stroke-linecap="round">
    <line x1="40" y1="56" x2="36" y2="66"/>
    <line x1="52" y1="56" x2="48" y2="66"/>
    <line x1="64" y1="56" x2="60" y2="66"/>
  </g>
  <!-- the day cards: washed-out today, glowing tomorrow -->
  <g>
    <rect x="26" y="76" width="26" height="24" rx="6" fill="#17422e"/>
    <rect x="31" y="82" width="16" height="4" rx="2" fill="#27754f"/>
    <rect x="31" y="90" width="10" height="4" rx="2" fill="#27754f"/>
  </g>
  <circle cx="83" cy="88" r="24" fill="url(#sprr-g)"/>
  <g>
    <rect x="70" y="76" width="26" height="24" rx="6" fill="#06140e" opacity="0.55" transform="translate(2.5,3)"/>
    <rect x="70" y="76" width="26" height="24" rx="6" fill="#8fd4ae"/>
    <rect x="75" y="82" width="16" height="4" rx="2" fill="#123324"/>
    <rect x="75" y="90" width="10" height="4" rx="2" fill="#1e5e3f"/>
  </g>
  <!-- the reflow arrow -->
  <path d="M52 88 h12" fill="none" stroke="#eafff3" stroke-width="3" stroke-linecap="round"/>
  <path d="M61 83.5 l5 4.5 -5 4.5" fill="none" stroke="#eafff3" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
