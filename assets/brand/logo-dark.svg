<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 356 64" role="img" aria-label="PlowzBox">
  <!-- PlowzBox primary lockup (for LIGHT backgrounds (explicit alias of logo.svg)).
       Wordmark is a custom monoline drawn as stroked paths - no <text>,
       no fonts: renders identically everywhere, matching the appliance's
       zero-downloaded-assets principle. Grid: cap 46, x-height 34,
       stroke 10.5, round caps/joins ("appliance corners"). -->
