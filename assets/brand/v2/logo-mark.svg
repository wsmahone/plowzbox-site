<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="PlowzBox mark">
  <!-- PlowzBox mark v2 - "the box that grows the lawn".
       One fused silhouette: the appliance in profile (low, wide, appliance
       corners, rx harmonized with the site radius language) with three
       grass blades growing straight out of its top. The breathing status
       LED on the front face is the single point of light. Grid-drawn on
       64; blades overlap the box to y42 so the union is seamless and the
       whole mark works as a one-color silhouette. Colors from tokens.css:
       green-700 body, green-300 LED. -->
  <g fill="#1e5e3f">
    <rect x="7" y="37.5" width="50" height="20.5" rx="7.25"/>
    <path d="M30.5 5.5 C33.7 14 36.1 25.5 35.8 42 L25.4 42 C25.4 25.5 27.6 14 30.5 5.5 Z"/>
    <path d="M12.5 18.5 C17.8 24 21.8 31.5 23.1 42 L16.6 42 C16.2 33.5 14.8 25.5 12.5 18.5 Z"/>
    <path d="M47.5 16.5 C43.4 22.5 40.3 30.5 39.6 42 L45.9 42 C46.4 33.5 47.3 24.5 47.5 16.5 Z"/>
  </g>
  <!-- status LED: soft glow + core -->
  <circle cx="45.5" cy="47.75" r="6.2" fill="#8fd4ae" opacity="0.20"/>
  <circle cx="45.5" cy="47.75" r="3.8" fill="#8fd4ae"/>
</svg>
